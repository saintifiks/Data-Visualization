<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Visualisasi Ekonomi B50</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        #main { width: 100%; height: 500px; max-width: 800px; margin: auto; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
        var chartDom = document.getElementById('main');
        var myChart = echarts.init(chartDom);
        var option;

        option = {
            title: { text: 'Simulasi Dampak Ekonomi B50', subtext: 'Sumber: Analisis CGE', left: 'center' },
            tooltip: { trigger: 'axis' },
            // Desain minimalis tanpa garis sampah
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: ['2024', '2025', '2026', '2027'], axisLine: { show: false } },
            yAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{
                name: 'PDB Riil (%)',
                data: [0.15, 0.12, 0.05, -0.05],
                type: 'line',
                smooth: true,
                color: '#000000', // Hitam murni agar terlihat profesional
                symbolSize: 10,
                lineStyle: { width: 4 }
            }]
        };

        myChart.setOption(option);
    </script>
</body>
</html>
